<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>

  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Tajawal',sans-serif; background:var(--paper); color:var(--ink); min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:24px;}
  .code{font-size:90px; font-weight:900; color:var(--teal); line-height:1;}
  h1{font-size:22px; margin:16px 0 10px;}
  p{opacity:.7; margin-bottom:26px;}
  a{display:inline-block; background:var(--amber); color:#fff; padding:13px 28px; border-radius:100px; text-decoration:none; font-weight:700;}
</style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>هذه الصفحة غير موجودة</h1>

  </div>

</html>
